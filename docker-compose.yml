services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-workbench:latest
    container_name: ai-workbench
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    labels:
      - "ai-workbench.version=7.5"
